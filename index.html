<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Task Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Karla:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F2F0E7;
    --paper-deep: #E9E5D8;
    --ink: #33403A;
    --ink-soft: #6B7570;
    --mist: #DDD8C8;
    --moss: #6E8F73;
    --moss-soft: #E1E9DF;
    --harbor: #5E7C99;
    --harbor-soft: #E1E7ED;
    --plum: #8C7196;
    --plum-soft: #EBE4EC;
    --honey: #B98A3E;
    --honey-soft: #F3E9D6;
    --clay: #C3876F;
    --clay-soft: #F3E5DE;
  }
  * { box-sizing: border-box; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  body {
    font-family: 'Karla', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    margin: 0;
    padding: 20px 16px 40px;
    line-height: 1.5;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 26px;
    margin: 0 0 4px 0;
    letter-spacing: -0.01em;
  }
  h1 .accent { font-style: italic; color: var(--moss); }
  .sub { color: var(--ink-soft); font-size: 12.5px; margin-bottom: 16px; }
  #resetBtn {
    background: transparent; color: var(--ink-soft); border: 1px solid var(--mist);
    padding: 6px 14px; border-radius: 20px; font-size: 11px; cursor: pointer;
    margin-bottom: 20px; font-family: 'Karla', sans-serif; transition: all 0.2s ease;
  }
  #resetBtn:hover { background: var(--paper-deep); color: var(--ink); }

  .ring-row { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
  .ring {
    position: relative; width: 84px; height: 84px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(var(--moss) calc(var(--pct) * 1%), var(--mist) 0);
    transition: background 0.6s ease;
  }
  .ring::before {
    content: ''; position: absolute; inset: 9px; border-radius: 50%; background: var(--paper);
  }
  .ring-label {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500; color: var(--ink);
  }
  .stat-row { display: flex; gap: 18px; flex: 1; flex-wrap: wrap; }
  .stat-item { }
  .stat-item .n { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; line-height: 1; }
  .stat-item .l { font-size: 10.5px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }
  .stat-item.done .n { color: var(--moss); }
  .stat-item.pending .n { color: var(--honey); }
  .stat-item.overdue .n { color: var(--clay); }

  .filters { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--paper-deep); border: 1px solid transparent; color: var(--ink-soft);
    padding: 6px 13px; border-radius: 20px; font-size: 12px; cursor: pointer;
    font-family: 'Karla', sans-serif; transition: all 0.2s ease;
  }
  .filter-btn:hover { background: var(--mist); }
  .filter-btn.active { background: var(--ink); color: var(--paper); }

  .cat-section { margin-bottom: 22px; }
  .cat-heading {
    font-family: 'Fraunces', serif; font-size: 14px; font-weight: 500; margin: 0 0 10px 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .cat-heading .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .cat-heading .count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-soft); font-weight: 400; }
  .task-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px;
  }
  .task {
    display: flex; align-items: flex-start; gap: 10px; background: #fff;
    border: 1px solid var(--mist); border-radius: 12px; padding: 12px 13px;
    animation: rise 0.25s ease-out; transition: opacity 0.3s ease, box-shadow 0.2s ease;
  }
  .task:hover { box-shadow: 0 2px 10px rgba(51,64,58,0.06); }
  @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .task.done { opacity: 0.5; background: var(--paper-deep); }
  .task input[type=checkbox] {
    margin-top: 2px; width: 17px; height: 17px; accent-color: var(--moss); flex-shrink: 0; cursor: pointer;
  }
  .task-body { flex: 1; min-width: 0; }
  .task-name { font-size: 12.5px; line-height: 1.35; }
  .task.done .task-name { text-decoration: line-through; color: var(--ink-soft); }
  .task-meta { font-size: 10px; margin-top: 6px; display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .tag {
    display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 500;
    padding: 3px 7px; border-radius: 5px; letter-spacing: 0.02em;
  }
  .own { background: var(--moss-soft); color: var(--moss); }
  .mhj { background: var(--harbor-soft); color: var(--harbor); }
  .shk { background: var(--plum-soft); color: var(--plum); }
  .personal { background: var(--honey-soft); color: var(--honey); }
  .urgent-tag { background: var(--clay-soft); color: var(--clay); }
  .due { color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; font-size: 10px; }

  .add-box { display: flex; gap: 8px; margin-top: 22px; }
  .add-box input, .add-box select {
    background: #fff; border: 1px solid var(--mist); color: var(--ink);
    padding: 9px 10px; border-radius: 8px; font-size: 12.5px; font-family: 'Karla', sans-serif;
  }
  .add-box input[type=text] { flex: 1; }
  .add-box button {
    background: var(--moss); color: #fff; border: none; padding: 9px 18px;
    border-radius: 8px; font-weight: 600; font-size: 12.5px; cursor: pointer;
    font-family: 'Karla', sans-serif; transition: background 0.2s ease;
  }
  .add-box button:hover { background: #5c7a61; }
  .empty { color: var(--ink-soft); font-size: 13px; text-align: center; padding: 30px; font-family: 'Fraunces', serif; font-style: italic; }
  .loading { text-align: center; padding: 40px; color: var(--ink-soft); }
</style>
</head>
<body>
<h1>Your <span class="accent">quiet</span> task ledger</h1>
<div class="sub" id="lastSync">Loading...</div>
<button id="resetBtn" onclick="resetData()">↻ Reset data (if stuck on old tasks)</button>

<div id="app">
  <div class="loading">Loading tasks...</div>
</div>

<div class="add-box">
  <select id="newCat">
    <option value="PERSONAL">PERSONAL</option>
    <option value="OWN">Professional — OWN</option>
    <option value="MHJ">Professional — MHJ</option>
    <option value="SHK">Professional — SHK Husain Arif</option>
  </select>
  <input type="text" id="newTask" placeholder="Add a new task...">
  <button onclick="addTask()">Add</button>
</div>

<script>
const STORAGE_KEY = 'tasks-v2';
const WEBHOOK_KEY = 'webhookUrl';
const DEFAULT_WEBHOOK = 'https://script.google.com/macros/s/AKfycbwbXqpF6ok4OLydQae2ORcc_AL9_UM-2km5hQYUMR0y1grw24D42SQB6RGrUnEo68NZCg/exec';
let tasks = [];
let filter = 'all'; // all, own, mhj, pending, done

function getWebhook() {
  return localStorage.getItem(WEBHOOK_KEY) || DEFAULT_WEBHOOK;
}

async function pushToCalendar(name, tag) {
  const url = getWebhook();
  if (!url) return null;
  try {
    const params = new URLSearchParams({ action: 'add', name, tag });
    const res = await fetch(url + '?' + params.toString());
    const data = await res.json();
    return data.id || null;
  } catch (e) { return null; }
}

async function deleteFromCalendar(taskId) {
  const url = getWebhook();
  if (!url || !taskId.startsWith('cal_')) return;
  try {
    const params = new URLSearchParams({ action: 'delete', id: taskId });
    await fetch(url + '?' + params.toString());
  } catch (e) { /* fire and forget */ }
}

async function pullFromCalendar() {
  const url = getWebhook();
  if (!url) return;
  try {
    const res = await fetch(url);
    const events = await res.json();
    const calIds = new Set(events.map(ev => ev.id));
    const existingIds = new Set(tasks.map(t => t.id));
    let added = 0;

    events.forEach(ev => {
      if (existingIds.has(ev.id)) return;
      const tag = ev.tag;
      const type = tag === 'PERSONAL' ? 'personal' : 'professional';
      const cat = tag === 'PERSONAL' ? null : tag;
      tasks.push({ id: ev.id, name: ev.title, type, cat, due: '', done: ev.done, urgent: false });
      added++;
    });

    // Remove tasks whose calendar event was deleted directly on Calendar
    // (only affects tasks that originated from / are linked to a real calendar event)
    const beforeCount = tasks.length;
    tasks = tasks.filter(t => !t.id.startsWith('cal_') || calIds.has(t.id));
    const removed = beforeCount - tasks.length;

    if (added > 0 || removed > 0) { saveTasks(); render(); }
    document.getElementById('lastSync').textContent = 'Synced with Calendar ✓ ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('lastSync').textContent = 'Calendar sync check failed';
  }
}

const seedTasks = [];

async function loadTasks() {
  let saved = [];
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) saved = JSON.parse(raw);
  } catch (e) {
    saved = [];
  }
  const savedIds = new Set(saved.map(t => t.id));
  const newFromSeed = seedTasks.filter(t => !savedIds.has(t.id));
  tasks = saved.concat(newFromSeed);
  if (newFromSeed.length > 0 || saved.length === 0) saveTasks();
  render();
}

async function saveTasks() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    document.getElementById('lastSync').textContent = 'Saved ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('lastSync').textContent = 'Save failed — changes kept only for this page load';
  }
}

function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (t) t.done = !t.done;
  saveTasks();
  render();
  if (t && t.id.startsWith('cal_')) {
    toggleOnCalendar(t.id, t.done);
  }
}

async function toggleOnCalendar(taskId, done) {
  const url = getWebhook();
  if (!url) return;
  try {
    const params = new URLSearchParams({ action: 'toggle', id: taskId, done: done ? 'true' : 'false' });
    await fetch(url + '?' + params.toString());
  } catch (e) { /* fire and forget */ }
}

function addTask() {
  const input = document.getElementById('newTask');
  const catVal = document.getElementById('newCat').value;
  const name = input.value.trim();
  if (!name) return;
  const type = catVal === 'PERSONAL' ? 'personal' : 'professional';
  const cat = catVal === 'PERSONAL' ? null : catVal;
  const localId = 'u'+Date.now();
  const task = {id:localId, name, type, cat, due:'', done:false, urgent:false};
  tasks.push(task);
  input.value = '';
  saveTasks();
  render();
  pushToCalendar(name, catVal).then(calId => {
    if (calId) {
      task.id = calId; // replace temp id with real calendar id for future delete/toggle
      saveTasks();
    }
  });
}

function deleteTask(id) {
  if (!confirm('Remove this task? This will also remove it from your Calendar.')) return;
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
  deleteFromCalendar(id);
}

function resetData() {
  if (!confirm('This will clear saved progress on THIS device and reload the latest task list. Continue?')) return;
  localStorage.removeItem(STORAGE_KEY);
  window.location.href = window.location.pathname + '?t=' + Date.now();
}

function setFilter(f) {
  filter = f;
  render();
}

function render() {
  const app = document.getElementById('app');
  const done = tasks.filter(t => t.done).length;
  const pending = tasks.filter(t => !t.done).length;
  const overdue = tasks.filter(t => !t.done && t.due === 'Overdue').length;
  const total = tasks.length;
  const pct = total ? Math.round((done/total)*100) : 0;

  let filtered = tasks;
  if (filter === 'personal') filtered = tasks.filter(t => t.type === 'personal');
  else if (filter === 'professional') filtered = tasks.filter(t => t.type === 'professional');
  else if (filter === 'own') filtered = tasks.filter(t => t.cat === 'OWN');
  else if (filter === 'mhj') filtered = tasks.filter(t => t.cat === 'MHJ');
  else if (filter === 'shk') filtered = tasks.filter(t => t.cat === 'SHK');
  else if (filter === 'pending') filtered = tasks.filter(t => !t.done);
  else if (filter === 'done') filtered = tasks.filter(t => t.done);

  filtered = [...filtered].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (!a.done && !b.done && a.urgent !== b.urgent) return a.urgent ? -1 : 1;
    return 0;
  });

  let html = `
    <div class="ring-row">
      <div class="ring" style="--pct:${pct}">
        <div class="ring-label">${pct}%</div>
      </div>
      <div class="stat-row">
        <div class="stat-item done"><div class="n">${done}</div><div class="l">Done</div></div>
        <div class="stat-item pending"><div class="n">${pending}</div><div class="l">Pending</div></div>
        <div class="stat-item overdue"><div class="n">${overdue}</div><div class="l">Overdue</div></div>
      </div>
    </div>
    <div class="filters">
      <button class="filter-btn ${filter==='all'?'active':''}" onclick="setFilter('all')">All</button>
      <button class="filter-btn ${filter==='personal'?'active':''}" onclick="setFilter('personal')">Personal</button>
      <button class="filter-btn ${filter==='professional'?'active':''}" onclick="setFilter('professional')">Professional</button>
      <button class="filter-btn ${filter==='pending'?'active':''}" onclick="setFilter('pending')">Pending</button>
      <button class="filter-btn ${filter==='done'?'active':''}" onclick="setFilter('done')">Done</button>
    </div>
    <div class="filters">
      <button class="filter-btn ${filter==='own'?'active':''}" onclick="setFilter('own')">OWN</button>
      <button class="filter-btn ${filter==='mhj'?'active':''}" onclick="setFilter('mhj')">MHJ</button>
      <button class="filter-btn ${filter==='shk'?'active':''}" onclick="setFilter('shk')">SHK Husain Arif</button>
    </div>
  `;

  if (filtered.length === 0) {
    html += '<div class="empty">No tasks here 🎉</div>';
  } else {
    const groupDefs = [
      { key: 'MHJ', label: 'Professional — MHJ', color: 'var(--harbor)', match: t => t.cat === 'MHJ' },
      { key: 'SHK', label: 'Professional — SHK Husain Arif', color: 'var(--plum)', match: t => t.cat === 'SHK' },
      { key: 'OWN', label: 'Professional — OWN', color: 'var(--moss)', match: t => t.cat === 'OWN' },
      { key: 'personal', label: 'Personal', color: 'var(--honey)', match: t => t.type === 'personal' },
    ];

    groupDefs.forEach(g => {
      const groupTasks = filtered.filter(g.match);
      if (groupTasks.length === 0) return;
      html += `<div class="cat-section">
        <div class="cat-heading"><span class="dot" style="background:${g.color}"></span>${g.label} <span class="count">${groupTasks.length}</span></div>
        <div class="task-grid">`;
      groupTasks.forEach(t => {
        const tagClass = t.type === 'personal' ? 'personal' : (t.cat === 'OWN' ? 'own' : (t.cat === 'MHJ' ? 'mhj' : 'shk'));
        const tagLabel = t.type === 'personal' ? 'PERSONAL' : t.cat;
        html += `
          <div class="task ${t.done?'done':''}">
            <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}')">
            <div class="task-body">
              <div class="task-name">${t.name}</div>
              <div class="task-meta">
                <span class="tag ${tagClass}">${tagLabel}</span>
                ${t.urgent && !t.done ? '<span class="tag urgent-tag">URGENT</span>' : ''}
                ${t.due ? '<span class="due">' + t.due + '</span>' : ''}
                <span onclick="deleteTask('${t.id}')" style="cursor:pointer; color:var(--ink-soft); font-size:13px; margin-left:auto;" title="Remove task">✕</span>
              </div>
            </div>
          </div>
        `;
      });
      html += `</div></div>`;
    });
  }

  app.innerHTML = html;
}

loadTasks().then(() => {
  pullFromCalendar();
});
</script>
</body>
</html>
