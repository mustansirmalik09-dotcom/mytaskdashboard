<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Task Dashboard</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#0f1115; color:#e6e6e6; margin:0; padding:14px; }
  h1 { font-size:19px; margin:0 0 2px 0; }
  .sub { color:#9aa0a6; font-size:12px; margin-bottom:14px; }
  .summary { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .stat { background:#1b1e24; border:1px solid #2a2d34; border-radius:10px; padding:8px 12px; flex:1; min-width:90px; text-align:center; }
  .stat .n { font-size:20px; font-weight:700; }
  .stat.done .n { color:#69f0ae; }
  .stat.pending .n { color:#ffab40; }
  .stat.overdue .n { color:#ff5252; }
  .stat .l { font-size:10px; color:#9aa0a6; }
  .progress-wrap { background:#1b1e24; border-radius:8px; height:10px; margin-bottom:16px; overflow:hidden; }
  .progress-bar { background:linear-gradient(90deg,#69f0ae,#4caf50); height:100%; transition: width .3s; }
  .filters { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .filter-btn { background:#1b1e24; border:1px solid #2a2d34; color:#9aa0a6; padding:6px 12px; border-radius:16px; font-size:12px; cursor:pointer; }
  .filter-btn.active { background:#2c3e50; color:#e6e6e6; border-color:#4a6fa5; }
  .group { margin-bottom:16px; }
  .group-title { font-size:13px; font-weight:700; color:#9ecbff; margin:0 0 6px 4px; display:flex; justify-content:space-between; }
  .task { display:flex; align-items:flex-start; gap:10px; background:#1b1e24; border:1px solid #2a2d34; border-radius:8px; padding:10px 12px; margin-bottom:6px; }
  .task.done { opacity:0.45; }
  .task input[type=checkbox] { margin-top:2px; width:18px; height:18px; accent-color:#69f0ae; flex-shrink:0; }
  .task-body { flex:1; }
  .task-name { font-size:13px; }
  .task.done .task-name { text-decoration: line-through; }
  .task-meta { font-size:10px; color:#9aa0a6; margin-top:2px; }
  .tag { display:inline-block; font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px; margin-right:5px; }
  .own { background:#1e3a2e; color:#69f0ae; }
  .mhj { background:#2a1e3a; color:#ce93d8; }
  .shk { background:#1e2a3a; color:#64b5f6; }
  .personal { background:#3a2e1e; color:#ffb74d; }
  .urgent-tag { background:#3a1f1f; color:#ff8a80; }
  .due { color:#ffab40; }
  .add-box { display:flex; gap:6px; margin-top:16px; }
  .add-box input, .add-box select { background:#1b1e24; border:1px solid #2a2d34; color:#e6e6e6; padding:8px; border-radius:6px; font-size:12px; }
  .add-box input[type=text] { flex:1; }
  .add-box button { background:#4caf50; color:#0f1115; border:none; padding:8px 14px; border-radius:6px; font-weight:700; font-size:12px; cursor:pointer; }
  .empty { color:#6a6f76; font-size:12px; text-align:center; padding:20px; }
  .loading { text-align:center; padding:40px; color:#9aa0a6; }
</style>
</head>

async function loadTasks() {
  let saved = [];
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) saved = JSON.parse(raw);
  } catch (e) {
    saved = [];
  }
  const savedIds = new Set(saved.map(t => t.id));
  const newFromSeed = seedTasks.filter(t => !savedIds.has(t.id));
  tasks = saved.concat(newFromSeed);
  if (newFromSeed.length > 0 || saved.length === 0) saveTasks();
  render();
}

async function saveTasks() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    document.getElementById('lastSync').textContent = 'Saved ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('lastSync').textContent = 'Save failed — changes kept only for this page load';
  }
}

function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (t) t.done = !t.done;
  saveTasks();
  render();
}

function addTask() {
  const input = document.getElementById('newTask');
  const catVal = document.getElementById('newCat').value;
  const name = input.value.trim();
  if (!name) return;
  const type = catVal === 'PERSONAL' ? 'personal' : 'professional';
  const cat = catVal === 'PERSONAL' ? null : catVal;
  tasks.push({id:'u'+Date.now(), name, type, cat, due:'', done:false, urgent:false});
  input.value = '';
  saveTasks();
  render();
}

function resetData() {
  if (!confirm('This will clear saved progress on THIS device and reload the latest task list. Continue?')) return;
  localStorage.removeItem(STORAGE_KEY);
  window.location.href = window.location.pathname + '?t=' + Date.now();
}

function setFilter(f) {
  filter = f;
  render();
}

function render() {
  const app = document.getElementById('app');
  const done = tasks.filter(t => t.done).length;
  const pending = tasks.filter(t => !t.done).length;
  const overdue = tasks.filter(t => !t.done && t.due === 'Overdue').length;
  const total = tasks.length;
  const pct = total ? Math.round((done/total)*100) : 0;

  let filtered = tasks;
  if (filter === 'personal') filtered = tasks.filter(t => t.type === 'personal');
  else if (filter === 'professional') filtered = tasks.filter(t => t.type === 'professional');
  else if (filter === 'own') filtered = tasks.filter(t => t.cat === 'OWN');
  else if (filter === 'mhj') filtered = tasks.filter(t => t.cat === 'MHJ');
  else if (filter === 'shk') filtered = tasks.filter(t => t.cat === 'SHK');
  else if (filter === 'pending') filtered = tasks.filter(t => !t.done);
  else if (filter === 'done') filtered = tasks.filter(t => t.done);

  filtered = [...filtered].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (!a.done && !b.done && a.urgent !== b.urgent) return a.urgent ? -1 : 1;
    return 0;
  });

  let html = `
    <div class="summary">
      <div class="stat done"><div class="n">${done}</div><div class="l">Completed</div></div>
      <div class="stat pending"><div class="n">${pending}</div><div class="l">Pending</div></div>
      <div class="stat overdue"><div class="n">${overdue}</div><div class="l">Overdue</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div class="filters">
      <button class="filter-btn ${filter==='all'?'active':''}" onclick="setFilter('all')">All</button>
      <button class="filter-btn ${filter==='personal'?'active':''}" onclick="setFilter('personal')">Personal</button>
      <button class="filter-btn ${filter==='professional'?'active':''}" onclick="setFilter('professional')">Professional</button>
      <button class="filter-btn ${filter==='pending'?'active':''}" onclick="setFilter('pending')">Pending</button>
      <button class="filter-btn ${filter==='done'?'active':''}" onclick="setFilter('done')">Done</button>
    </div>
    <div class="filters">
      <button class="filter-btn ${filter==='own'?'active':''}" onclick="setFilter('own')">OWN</button>
      <button class="filter-btn ${filter==='mhj'?'active':''}" onclick="setFilter('mhj')">MHJ</button>
      <button class="filter-btn ${filter==='shk'?'active':''}" onclick="setFilter('shk')">SHK Husain Arif</button>
    </div>
  `;

  if (filtered.length === 0) {
    html += '<div class="empty">No tasks here 🎉</div>';
  } else {
    filtered.forEach(t => {
      const tagClass = t.type === 'personal' ? 'personal' : (t.cat === 'OWN' ? 'own' : (t.cat === 'MHJ' ? 'mhj' : 'shk'));
      const tagLabel = t.type === 'personal' ? 'PERSONAL' : t.cat;
      html += `
        <div class="task ${t.done?'done':''}">
          <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}')">
          <div class="task-body">
            <div class="task-name">${t.name}</div>
            <div class="task-meta">
              <span class="tag ${tagClass}">${tagLabel}</span>
              ${t.urgent && !t.done ? '<span class="tag urgent-tag">URGENT</span>' : ''}
              ${t.due ? '<span class="due">' + t.due + '</span>' : ''}
            </div>
          </div>
        </div>
      `;
    });
  }

  app.innerHTML = html;
}

loadTasks();
